<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Warships - 公式</title>
    <style>
        body { 
            background-color: #0b111e; 
            color: white; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; 
            padding: 60px 20px;
            margin: 0;
        }
        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: #131c2e; 
            padding: 35px 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        h1 { 
            font-size: 24px; 
            margin-bottom: 15px; 
            color: #4facfe; 
        }
        p { 
            font-size: 14px; 
            color: #a0aec0; 
            margin-bottom: 35px; 
            line-height: 1.6;
        }
        .btn { 
            display: block; 
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 18px; 
            transition: 0.3s; 
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4); 
        }
        .btn:hover { 
            transform: scale(1.03); 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>World of Warships</h1>
        <p>【日本限定特典】<br>基本プレイ無料！今すぐド派手な海戦に参加して、伝説의 戦艦を操ろう。</p>
        <a href="https://google.com" class="btn">【公式】無料でプレイする</a>
    </div>
</body>
</html>
