<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Download Center</title>
    <style>
        body { 
            background-color: #0b111e; 
            color: white; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; 
            padding: 80px 20px;
            margin: 0;
        }
        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: #131c2e; 
            padding: 40px 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .icon-placeholder {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px auto;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }
        h1 { 
            font-size: 22px; 
            margin-bottom: 8px; 
            color: #ffffff; 
        }
        .badge {
            display: inline-block;
            background-color: rgba(79, 172, 254, 0.15);
            color: #4facfe;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }
        p { 
            font-size: 14px; 
            color: #a0aec0; 
            margin-bottom: 35px; 
            line-height: 1.6;
        }
        .btn { 
            display: block; 
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 14px; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.3s; 
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4); 
        }
        .btn:hover { 
            transform: scale(1.02); 
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
        }
        .footer-text {
            font-size: 11px;
            color: #4a5568;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-placeholder"></div>
        <h1>Official Download Portal</h1>
        <div class="badge">▼ VERIFIED SECURE LINK ▼</div>
        <p>Thank you for watching!<br>The official app featured in our video is available for safe, fast, and free download below.</p>
        
        <a href="https://google.com" class="btn">Download & Play Now (Free)</a>
        
        <div class="footer-text">Verified by Mobile Security System</div>
    </div>
</body>
</html>
